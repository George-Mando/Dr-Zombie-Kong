<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>DR. ZOMBIE KONG</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;
  background:#000;
  overflow:hidden;
  font-family:'Courier New',monospace;
  touch-action:none;
}
#wrap{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;
  background:#000;
}
/* Game canvas — takes all space above controls */
#c{
  display:block;
  width:100%;
  max-width:420px;
  flex:1;
  min-height:0;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
  background:#000;
}
/* HUD strip */
#hud{
  width:100%;max-width:420px;
  display:flex;justify-content:space-between;
  padding:3px 10px;
  background:#0a0a0a;
  border-top:2px solid #ff4400;
  border-bottom:1px solid #330a00;
  flex-shrink:0;
}
#hud span{font-size:11px;font-weight:bold;}
#sc{color:#ffcc00;}#lv2{color:#ff6666;}#lv{color:#66ff88;}#hi{color:#ffff44;}
/* Controls area */
#ctrl{
  width:100%;max-width:420px;
  height:170px;
  background:#080808;
  border-top:2px solid #333;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:6px 14px;
  flex-shrink:0;
}
/* D-pad left side */
#dpad{
  display:grid;
  grid-template-columns:60px 60px 60px;
  grid-template-rows:60px 60px;
  gap:5px;
}
/* Right side buttons */
#rside{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
}
/* Button base */
.b{
  background:#111;
  border:3px solid #555;
  color:#ccc;
  border-radius:14px;
  cursor:pointer;
  font-family:'Courier New',monospace;
  font-weight:900;
  user-select:none;-webkit-user-select:none;
  touch-action:none;
  -webkit-tap-highlight-color:transparent;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  line-height:1.1;
}
.b:active,.b.pr{transform:scale(0.91);}
/* D-pad buttons */
.db{width:60px;height:60px;font-size:24px;border-color:#444;}
.db:active,.db.pr{background:#333;border-color:#888;}
/* UP/DOWN - yellow tint (ladder) */
#bup{border-color:#cc9900;color:#ffcc00;background:#120e00;}
#bup:active,#bup.pr{background:#ffcc00;color:#000;}
#bdown{border-color:#996600;color:#cc9900;background:#100c00;}
#bdown:active,#bdown.pr{background:#cc9900;color:#000;}
/* Blank cell */
.blank{width:60px;height:60px;}
/* JUMP — red, big, round */
#bjump{
  width:88px;height:88px;
  font-size:24px;
  border-color:#ff4400;color:#ff6622;
  border-radius:50%;border-width:4px;
  background:#180500;
}
#bjump:active,#bjump.pr{background:#ff4400;color:#fff;}
/* START */
#bstart{
  background:#220000;border:2px solid #ff4400;color:#ff6644;
  border-radius:10px;padding:9px 16px;font-size:12px;font-weight:900;
  cursor:pointer;font-family:'Courier New',monospace;touch-action:none;
  user-select:none;width:88px;text-align:center;
}
#bstart:active{background:#ff4400;color:#fff;}
/* Overlay */
#overlay{
  position:absolute;
  top:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:420px;
  height:calc(100% - 170px - 26px);
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
  z-index:20;
}
#msg{
  background:rgba(0,0,0,0.88);
  border:3px solid #ff4400;
  border-radius:8px;
  padding:16px 20px;
  text-align:center;
  width:85%;
  max-width:300px;
}
#msg h2{font-size:16px;color:#ffcc00;text-shadow:0 0 8px #ff6600;margin-bottom:8px;}
#msg p{font-size:11px;color:#ffaa66;line-height:1.75;}
#msg.hidden{display:none;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="360" height="280"></canvas>
  <div id="hud">
    <span id="sc">SCORE: 0</span>
    <span id="lv2">❤❤❤</span>
    <span id="lv">STAGE 1</span>
    <span id="hi">HI: 0</span>
  </div>
  <div id="ctrl">
    <div id="dpad">
      <div class="blank"></div>
      <button class="b db" id="bup">▲<br><span style="font-size:9px">UP</span></button>
      <div class="blank"></div>
      <button class="b db" id="bl">◄</button>
      <button class="b db" id="bdown">▼<br><span style="font-size:9px">DN</span></button>
      <button class="b db" id="br">►</button>
    </div>
    <div id="rside">
      <button class="b" id="bjump">JUMP</button>
      <button id="bstart" onclick="startGame()">▶ START</button>
    </div>
  </div>
</div>
<div id="overlay">
  <div id="msg">
    <h2>🧟 DR. ZOMBIE KONG</h2>
    <p>Dr. Z kidnapped the Princess! 👸<br><br>
    ◄ ► Walk left / right<br>
    ▲ UP + walk onto ladder = climb<br>
    ▼ DN = climb down<br>
    JUMP = hop over zombies only!<br>
    Reach the 👸 Princess to win!</p>
  </div>
</div>

<script>
'use strict';
// ═══════════════════════════════════════════════════
//  DR. ZOMBIE KONG
//  Visual style: classic arcade Donkey Kong
//  - Red steel girders / platforms
//  - Dark background with scan lines
//  - Proper pixel-art style score display
//  Jump height deliberately LOW — only clears zombies
//  Climbing via ladders only
// ═══════════════════════════════════════════════════
const C=document.getElementById('c'), X=C.getContext('2d');

// Canvas internal resolution
const CW=360, CH=280;
C.width=CW; C.height=CH;

// Make canvas fill available space while keeping aspect
function resizeC(){
  const wrap=document.getElementById('wrap');
  const ctrlH=170, hudH=26;
  const avail=window.innerHeight-ctrlH-hudH;
  const maxW=Math.min(window.innerWidth,420);
  const scale=Math.min(maxW/CW, avail/CH);
  C.style.width=(CW*scale)+'px';
  C.style.height=(CH*scale)+'px';
}
resizeC();
window.addEventListener('resize',resizeC);

// ─────────────────────────────────────────
//  COLOUR PALETTE  (classic arcade DK look)
// ─────────────────────────────────────────
const PAL={
  bg:'#000000',
  girder:'#cc4400',    // classic DK red/orange steel
  girderHi:'#ff6622',  // girder top highlight
  girderDk:'#882200',  // girder shadow
  ladder:'#4488ff',    // blue ladders (like classic DK)
  ladderRung:'#88bbff',
  rivet:'#ffcc00',     // gold rivets on girders
  ground:'#cc4400',    // bottom ground girder
  txtScore:'#ffcc00',
  txtHi:'#ff4400',
};

// ─────────────────────────────────────────
//  WORLD LAYOUT — 7 floors, 38px gap each
//  Gap=38px, jump peak=21px → CANNOT reach next floor
//  Zombie height=18px, jump peak=21px → CAN clear zombie
// ─────────────────────────────────────────
const GIRDERS=[
  {y:262, x:4,  w:352, tilt:3},   // 0 bottom  → exits right
  {y:224, x:4,  w:340, tilt:-3},  // 1         ← exits left
  {y:186, x:4,  w:352, tilt:3},   // 2         → exits right
  {y:148, x:4,  w:340, tilt:-3},  // 3         ← exits left
  {y:110, x:4,  w:352, tilt:3},   // 4         → exits right
  {y:72,  x:4,  w:340, tilt:-3},  // 5         ← exits left
  {y:34,  x:4,  w:352, tilt:-3},  // 6 top     ← doctor + princess
];
const GH=10; // girder height

// Ladders — one per level gap, alternating sides
const LADDERS=[
  {cx:70,  y1:GIRDERS[1].y, y2:GIRDERS[0].y+GH, w:14},
  {cx:280, y1:GIRDERS[2].y, y2:GIRDERS[1].y+GH, w:14},
  {cx:90,  y1:GIRDERS[3].y, y2:GIRDERS[2].y+GH, w:14},
  {cx:260, y1:GIRDERS[4].y, y2:GIRDERS[3].y+GH, w:14},
  {cx:80,  y1:GIRDERS[5].y, y2:GIRDERS[4].y+GH, w:14},
  {cx:250, y1:GIRDERS[6].y, y2:GIRDERS[5].y+GH, w:14},
];

// ─────────────────────────────────────────
//  GAME STATE
// ─────────────────────────────────────────
let state='menu', score=0, hiScore=0, lives=3, stage=1, frame=0;

// ─────────────────────────────────────────
//  PLAYER
//  jumpPower is intentionally small — only clears zombie height
//  The gap between platforms is ~48px, zombie height is 28px
//  So max jump = 32px upward — enough to hop zombie but NOT reach next floor
// ─────────────────────────────────────────
// Jump physics (exact):
// vy=-4.6, gravity=0.5 → peak = vy²/(2g) = 21.2px
// Zombie height = 18px → clears with 3px spare ✓
// Floor gap = 38px   → 21px peak cannot reach next floor ✓
const JUMP_VY=-4.6;
const GRAVITY=0.5;

const PL={
  x:20, y:0,
  w:18, h:24,
  vx:0, vy:0,
  onGround:false,
  climbing:false,
  climbLad:null,
  dir:1,
  walkF:0,
  invincible:0,
  dead:false, deathTimer:0
};

// ─────────────────────────────────────────
//  DOCTOR + PRINCESS
// ─────────────────────────────────────────
const DOC={x:0,y:0,w:32,h:48,throwTimer:0,throwInterval:150,animF:0,laughTimer:0};
const PRINCESS={x:0,y:0,w:22,h:36,animF:0};

// ─────────────────────────────────────────
//  ZOMBIES  (barrels)
//  Walk down each girder in the tilt direction,
//  fall off the low end, land on the next girder
// ─────────────────────────────────────────
let zombies=[];

// ─────────────────────────────────────────
//  PILLS + FIRES + FX
// ─────────────────────────────────────────
let pills=[], fires=[], particles=[], pops=[];

// ─────────────────────────────────────────
//  RIVETS on girders (DK aesthetic)
// ─────────────────────────────────────────
function getRivets(g){
  const rv=[];
  for(let rx=g.x+14;rx<g.x+g.w-10;rx+=22){
    rv.push({x:rx,y:g.y+GH/2});
  }
  return rv;
}

// ─────────────────────────────────────────
//  INIT STAGE
// ─────────────────────────────────────────
function initStage(s){
  zombies=[];pills=[];fires=[];particles=[];pops=[];
  frame=0;
  DOC.throwInterval=Math.max(55,160-s*18);
  DOC.throwTimer=Math.floor(DOC.throwInterval*0.6);
  DOC.laughTimer=0;
  // Doctor on top girder, right side
  const topG=GIRDERS[GIRDERS.length-1];
  DOC.x=topG.x+topG.w-56;
  DOC.y=topG.y-DOC.h;
  // Princess on top girder, left side (chained)
  PRINCESS.x=topG.x+12;
  PRINCESS.y=topG.y-PRINCESS.h;

  // Pills on girders 1-5 (all middle floors)
  [{g:1,ox:55},{g:1,ox:170},{g:1,ox:280},
   {g:2,ox:70},{g:2,ox:180},{g:2,ox:280},
   {g:3,ox:60},{g:3,ox:180},
   {g:4,ox:80},{g:4,ox:220},
   {g:5,ox:70},{g:5,ox:200}
  ].forEach(({g,ox})=>{
    pills.push({x:GIRDERS[g].x+ox, y:GIRDERS[g].y-13, w:12,h:12, collected:false});
  });

  // Fires: stage 2+ only, bottom floor
  if(s>=2){
    const n=Math.min(s-1,3);
    for(let i=0;i<n;i++){
      fires.push({x:GIRDERS[0].x+120+i*65, y:GIRDERS[0].y-20, animF:i*7});
    }
  }

  // Player starts bottom-left
  PL.x=GIRDERS[0].x+16;
  PL.y=GIRDERS[0].y-PL.h;
  PL.vx=0;PL.vy=0;
  PL.onGround=true;PL.climbing=false;PL.climbLad=null;
  PL.dead=false;PL.deathTimer=0;
  PL.invincible=90;PL.dir=1;PL.walkF=0;
}

// ─────────────────────────────────────────
//  ZOMBIE SPAWN + PHYSICS
//  Zombie logic:
//  1. Walk across girder in the tilt direction
//  2. When it reaches the LOW end (based on tilt), drop off
//  3. Fall under gravity until hitting the next girder below
//  4. Repeat until off girder 0 → despawn
// ─────────────────────────────────────────
function spawnZombie(){
  const spd=0.75+(stage-1)*0.22+Math.random()*0.25;
  const topG=GIRDERS[GIRDERS.length-1];
  zombies.push({
    x: DOC.x-20,
    y: topG.y-18,
    w:14,h:18,
    spd,
    dir:-1,
    gIdx:GIRDERS.length-1,
    falling:false,
    vy:0,
    animF:0,
    dead:false,deathTimer:0,
    scored:false,
    charging:false
  });
  DOC.laughTimer=65;
  spawnFX(DOC.x+DOC.w/2, DOC.y+DOC.h, '#22ff44', 5, -1.5);
}

function updateZombies(){
  zombies=zombies.filter(z=>{
    if(z.dead){z.deathTimer--;return z.deathTimer>0;}
    z.animF++;

    // ── PLAYER PROXIMITY SPEED BOOST ──
    // When player is on the SAME girder and within 120px, zombie charges faster
    // When player is on a different girder, zombie maintains normal pace
    const playerOnSameGirder = !PL.dead && !PL.climbing &&
      PL.y+PL.h >= GIRDERS[z.gIdx].y-4 && PL.y+PL.h <= GIRDERS[z.gIdx].y+16;
    const distToPlayer = Math.abs((PL.x+PL.w/2)-(z.x+z.w/2));
    const sameGirderClose = playerOnSameGirder && distToPlayer < 140;
    const effectiveSpd = sameGirderClose
      ? z.spd * (1.8 + Math.min(1.0, (140-distToPlayer)/140))  // charge! up to 2.8x speed
      : z.spd;

    // Flash red when charging
    z.charging = sameGirderClose;

    if(z.falling){
      // Gravity — use strong downward pull so zombie snaps to next girder quickly
      z.vy = Math.min(z.vy + 0.8, 8);
      z.y += z.vy;
      // Horizontal drift while falling — keep moving in same direction slowly
      z.x += z.dir * z.spd * 0.3;

      // ── LAND ON ANY GIRDER BELOW (check all, not just gIdx-1) ──
      // This prevents skipping platforms when falling fast
      let landed=false;
      for(let ni=z.gIdx-1;ni>=0;ni--){
        const ng=GIRDERS[ni];
        // Zombie must be horizontally on the girder to land
        const onGirderX = z.x+z.w > ng.x+4 && z.x < ng.x+ng.w-4;
        if(onGirderX && z.y+z.h >= ng.y && z.y+z.h <= ng.y+z.vy+2){
          // Land here
          z.y = ng.y - z.h;
          z.gIdx = ni;
          z.falling = false;
          z.vy = 0;
          // Walk downhill on new girder
          if(ng.tilt>0)       z.dir=1;
          else if(ng.tilt<0)  z.dir=-1;
          // tilt=0 (flat): keep existing direction
          landed=true;
          break;
        }
      }
      if(!landed && z.y > CH+20) return false;
      return true;
    }

    // ── WALKING ON GIRDER ──
    const g=GIRDERS[z.gIdx];
    z.y=g.y-z.h;
    z.x+=z.dir*effectiveSpd;

    const lEdge=g.x+2;
    const rEdge=g.x+g.w-z.w-2;

    if(z.dir<0 && z.x<=lEdge){
      z.x=lEdge;
      if(g.tilt<=0){
        // Left is the low end (or flat) → roll off
        z.falling=true; z.vy=1.5;
      } else {
        z.dir=1; // left is high end → bounce
      }
    } else if(z.dir>0 && z.x>=rEdge){
      z.x=rEdge;
      if(g.tilt>=0){
        // Right is low end (or flat) → roll off
        z.falling=true; z.vy=1.5;
      } else {
        z.dir=-1;
      }
    }

    // Girder 0: rolled off either end → despawn
    if(z.gIdx===0 && z.falling) {
      // Give a moment to fall off screen
    }
    if(z.y > CH+40) return false;

    // ── SCORE: player jumped over this zombie ──
    if(!z.scored&&!PL.dead&&PL.vy<-0.1){
      const pcx=PL.x+PL.w/2, zcx=z.x+z.w/2;
      if(Math.abs(pcx-zcx)<26 && PL.y+PL.h <= z.y+4 && !PL.climbing){
        z.scored=true;
        score+=150;
        addPop(zcx, z.y-10, '+150', '#ffcc00');
        updateHUD();
      }
    }

    // ── HURT PLAYER on contact ──
    if(!PL.dead&&PL.invincible<=0){
      if(overlap(PL,{x:z.x+3,y:z.y+4,w:z.w-6,h:z.h-8})){
        hurtPlayer();
      }
    }
    return true;
  });
}

// ─────────────────────────────────────────
//  PLAYER UPDATE
// ─────────────────────────────────────────
let keys={};
let tLeft=false,tRight=false,tUp=false,tDown=false;

// JUMP: limited height, only useful for hopping over zombies
// Platform gap ≈ 48px, zombie height ≈ 28px
// At vy=-5.2, gravity=0.5 → peak = vy²/(2g) ≈ 27px  ✓ clears zombie, ✗ can't reach platform
function doJump(){
  if(PL.dead||PL.climbing)return;
  if(PL.onGround){
    PL.vy=JUMP_VY;
    PL.onGround=false;
    spawnFX(PL.x+PL.w/2,PL.y+PL.h,'#4488ff',3,-0.8);
  }
}

function updatePlayer(){
  if(PL.dead){
    PL.deathTimer--;
    if(PL.deathTimer<=0){
      lives--;updateHUD();
      if(lives<=0){
        state='gameover';
        showOverlay('💀 GAME OVER 💀','Score: '+score+'<br>The outbreak won!<br><br>Press START to try again');
      } else {
        initStage(stage);state='playing';hideOverlay();
      }
    }
    return;
  }
  if(PL.invincible>0)PL.invincible--;

  const goL = keys['ArrowLeft'] ||keys['a']||tLeft;
  const goR = keys['ArrowRight']||keys['d']||tRight;
  const goU = keys['ArrowUp']   ||keys['w']||tUp;
  const goD = keys['ArrowDown'] ||keys['s']||tDown;

  // ── ON LADDER ──
  if(PL.climbing){
    PL.vx=0;
    PL.vy = goU?-2.2:goD?2.2:0;
    PL.y+=PL.vy;
    PL.x=PL.climbLad.cx-PL.w/2; // lock to ladder centre

    // Arrive at top girder
    if(goU&&PL.y+PL.h<=PL.climbLad.y1+2){
      PL.y=PL.climbLad.y1-PL.h;
      PL.climbing=false;PL.climbLad=null;
      PL.vy=0;PL.onGround=true;
    }
    // Return to bottom girder
    if(goD&&PL.y+PL.h>=PL.climbLad.y2){
      PL.y=PL.climbLad.y2-PL.h;
      PL.climbing=false;PL.climbLad=null;
      PL.vy=0;PL.onGround=true;
    }
    // Slid off bottom
    if(PL.y+PL.h>PL.climbLad.y2+10){
      PL.climbing=false;PL.climbLad=null;
    }

    // Pills while climbing
    collectPills();
    return;
  }

  // ── WALKING ──
  if(goL){PL.vx=-2.4;PL.dir=-1;}
  else if(goR){PL.vx=2.4;PL.dir=1;}
  else PL.vx*=0.68;

  if(PL.onGround&&Math.abs(PL.vx)>0.2)PL.walkF++;

  // Gravity
  PL.vy=Math.min(PL.vy+GRAVITY,10);
  PL.x+=PL.vx;
  PL.y+=PL.vy;
  PL.onGround=false;

  // ── GIRDER LANDING ──
  for(const g of GIRDERS){
    if(PL.x+PL.w>g.x+2&&PL.x<g.x+g.w-2){
      if(PL.vy>=0&&PL.y+PL.h>g.y&&PL.y+PL.h<=g.y+16){
        PL.y=g.y-PL.h;
        PL.vy=0;PL.onGround=true;
        break;
      }
    }
  }

  // ── GRAB LADDER ──
  // Only attach when pressing UP and player is aligned with ladder opening
  if(goU){
    for(const lad of LADDERS){
      const lx=lad.cx-lad.w/2-4;
      const rx=lad.cx+lad.w/2+4;
      if(PL.x+PL.w>lx&&PL.x<rx){
        // Player feet must be near the bottom of this ladder (standing on lower girder)
        const nearBase=Math.abs(PL.y+PL.h-lad.y2)<14;
        // Or player is mid-way up (grabbed while jumping over it) — NO, DK style only from base
        if(nearBase){
          PL.climbing=true;
          PL.climbLad=lad;
          PL.vx=0;PL.vy=0;
          PL.x=lad.cx-PL.w/2;
          break;
        }
      }
    }
  }

  // World bounds
  PL.x=Math.max(0,Math.min(CW-PL.w,PL.x));
  if(PL.y>CH+30){hurtPlayer();return;}
  if(PL.y<0){PL.y=0;PL.vy=Math.abs(PL.vy)*0.2;}

  collectPills();

  // Fire collision
  fires.forEach(f=>{
    if(overlap(PL,{x:f.x-2,y:f.y+8,w:16,h:10}))hurtPlayer();
  });

  // Win: touch princess
  if(!PL.dead&&overlap(PL,PRINCESS)){winStage();}
}

function collectPills(){
  pills.forEach(p=>{
    if(p.collected)return;
    if(overlap(PL,{x:p.x,y:p.y,w:p.w,h:p.h})){
      p.collected=true;score+=300;
      addPop(p.x+6,p.y-4,'💊+300','#ffdd44');
      spawnFX(p.x+6,p.y,'#ffdd00',7,-1.5);
      updateHUD();
    }
  });
}

function hurtPlayer(){
  if(PL.invincible>0||PL.dead)return;
  PL.dead=true;PL.deathTimer=55;
  PL.vy=-4;PL.vx=0;
  PL.climbing=false;PL.climbLad=null;
  spawnFX(PL.x+PL.w/2,PL.y+PL.h*.5,'#ff2200',12,-3);
}

function winStage(){
  score+=1200+stage*500;updateHUD();
  spawnFX(PRINCESS.x+11,PRINCESS.y,'#ff88cc',18,-3);
  spawnFX(DOC.x+16,DOC.y,'#ffcc00',14,-4);
  const next=stage+1;
  const last=stage>=5;
  stage=next;
  state='stageclear';
  showOverlay(
    last?'🎉 YOU WIN! 🎉':'👸 Princess Rescued!',
    last?'The outbreak is cured!<br>Score: '+score+'<br><br>Press START to play again!'
       :'Dr. Z escapes again...<br>Score: '+score+'<br><br>Stage '+next+' starting...'
  );
  if(!last){
    setTimeout(()=>{
      initStage(stage);state='playing';hideOverlay();
    },2600);
  } else {
    state='win';
  }
}

// ── BACKGROUND ──
function drawBG(){
  X.fillStyle='#000';X.fillRect(0,0,CW,CH);
  // Subtle dark scanlines (CRT effect)
  X.fillStyle='rgba(0,0,0,0.25)';
  for(let sy=0;sy<CH;sy+=2)X.fillRect(0,sy,CW,1);
  // Stage number watermark
  X.fillStyle='rgba(80,20,0,0.2)';
  X.font='bold 80px monospace';X.textAlign='center';
  X.fillText(stage,CW/2,CH*.65);
  X.textAlign='left';
}

// ── GIRDERS (classic red steel DK look) ──
function drawGirders(){
  GIRDERS.forEach((g,i)=>{
    const lean=g.tilt;
    // Shadow beneath
    X.fillStyle='rgba(0,0,0,0.5)';
    X.fillRect(g.x+3,g.y+GH+2,g.w,5);

    // Main girder body
    X.fillStyle=PAL.girder;
    X.fillRect(g.x,g.y,g.w,GH);

    // Top highlight stripe
    X.fillStyle=PAL.girderHi;
    X.fillRect(g.x,g.y,g.w,3);

    // Bottom dark stripe
    X.fillStyle=PAL.girderDk;
    X.fillRect(g.x,g.y+GH-3,g.w,3);

    // Slight tilt fill (triangular shadow at high end)
    if(lean!==0){
      X.fillStyle=PAL.girderDk;
      const tw=Math.abs(lean)*8;
      if(lean>0){
        // Right is lower, left is higher — shadow on left
        X.beginPath();X.moveTo(g.x,g.y);X.lineTo(g.x+tw,g.y);X.lineTo(g.x,g.y+GH);X.closePath();X.fill();
      } else {
        // Left is lower, right is higher — shadow on right
        X.beginPath();X.moveTo(g.x+g.w,g.y);X.lineTo(g.x+g.w-tw,g.y);X.lineTo(g.x+g.w,g.y+GH);X.closePath();X.fill();
      }
    }

    // Rivets — gold dots along girder (iconic DK look)
    X.fillStyle=PAL.rivet;
    for(let rx=g.x+10;rx<g.x+g.w-6;rx+=20){
      X.beginPath();X.arc(rx,g.y+GH/2,2.5,0,Math.PI*2);X.fill();
      // Rivet shine
      X.fillStyle='rgba(255,255,200,0.5)';
      X.beginPath();X.arc(rx-1,g.y+GH/2-1,1,0,Math.PI*2);X.fill();
      X.fillStyle=PAL.rivet;
    }

    // Arrow showing tilt direction (helps player understand flow)
    if(lean!==0){
      X.fillStyle='rgba(255,200,100,0.55)';
      X.font='8px monospace';X.textAlign='center';
      X.fillText(lean>0?'→→':'←←',g.x+g.w/2,g.y-3);
      X.textAlign='left';
    }
  });

  // Ground floor (thick bottom girder)
  X.fillStyle=PAL.girderDk;
  X.fillRect(0,CH-8,CW,8);
  X.fillStyle=PAL.girder;
  X.fillRect(0,CH-8,CW,3);
}

// ── LADDERS (classic blue DK look) ──
function drawLadders(){
  LADDERS.forEach(l=>{
    const lx=l.cx-l.w/2;
    const h=l.y2-l.y1;

    // Background behind ladder (punch hole through girder)
    X.fillStyle='#111';
    X.fillRect(lx-2,l.y1,l.w+4,h);

    // Rails
    X.fillStyle=PAL.ladder;
    X.fillRect(lx,l.y1,3,h);
    X.fillRect(lx+l.w-3,l.y1,3,h);

    // Rungs
    X.fillStyle=PAL.ladderRung;
    for(let ry=l.y1+5;ry<l.y2;ry+=8){
      X.fillRect(lx+2,ry,l.w-4,3);
    }

    // Top and bottom end caps
    X.fillStyle=PAL.ladderRung;
    X.fillRect(lx-2,l.y1,l.w+4,3);
    X.fillRect(lx-2,l.y2-3,l.w+4,3);
  });
}

// ── FIRES ──

  if(z.dead)return;

  // Charging glow (red aura when chasing player)

    const glow=0.3+Math.sin(frame*.3)*0.15;

  X.beginPath();X.arc(p+12,q+5.5,1.5,0,Math.PI*2);X.fill();

}

// ── PARTICLES / POPS ──
function drawFX(){
  particles=particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life--;
    X.globalAlpha=p.life/p.maxLife;X.fillStyle=p.col;
    X.fillRect(p.x,p.y,3,3);X.globalAlpha=1;
    return p.life>0;
  });
  pops=pops.filter(p=>{
    p.y-=.5;p.life--;
    X.globalAlpha=p.life/p.maxLife;
    X.fillStyle=p.col;X.font='bold 10px monospace';X.textAlign='center';
    X.fillText(p.txt,p.x,p.y);X.globalAlpha=1;X.textAlign='left';
    return p.life>0;
  });
}

// ── HUD ON CANVAS  (DK-style score display inside game) ──
function drawCanvasHUD(){
  // Small info bar at top of canvas
  X.fillStyle='rgba(0,0,0,0.7)';X.fillRect(0,0,CW,16);
  X.fillStyle='#ffcc00';X.font='bold 10px monospace';
  X.fillText('SCORE '+score,4,12);
  X.fillStyle='#ff6644';
  X.fillText('HI '+Math.max(score,hiScore),CW/2-30,12);
  // Lives as hearts
  X.fillStyle='#ff4444';
  for(let i=0;i<Math.max(0,lives);i++) X.fillText('♥',CW-14-i*12,12);
  // Stage clear countdown hint arrow to princess
  if(state==='playing'){
    X.fillStyle='rgba(255,180,220,0.7)';X.font='9px monospace';
    X.textAlign='right';X.fillText('👸',CW-4,CH-4);X.textAlign='left';
  }
}

// ─────────────────────────────────────────
//  MAIN LOOP
// ─────────────────────────────────────────
let lastT=0;
function loop(ts){
  requestAnimationFrame(loop);
  if(!lastT)lastT=ts;
  lastT=ts;
  frame++;

  if(state!=='playing')return;

  updatePlayer();
  updateZombies();

  DOC.throwTimer--;
  if(DOC.throwTimer<=0){spawnZombie();DOC.throwTimer=DOC.throwInterval;}

  // Render
  drawBG();
  drawGirders();
  drawLadders();
  drawFires();
  drawPills();
  drawPrincess();
  zombies.forEach(drawZombie);
  drawPlayer();
  drawDoctor();
  drawFX();
  drawCanvasHUD();
}

// ─────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────
function overlap(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function spawnFX(x,y,col,n=6,v=-1.5){
  for(let i=0;i<n;i++) particles.push({x,y,vx:(Math.random()-.5)*3.5,vy:v+Math.random()*2,col,life:22,maxLife:22});
}
function addPop(x,y,txt,col){pops.push({x,y,txt,col,life:48,maxLife:48});}

// ─────────────────────────────────────────
//  HUD
// ─────────────────────────────────────────
function updateHUD(){
  document.getElementById('sc').textContent='SCORE: '+score;
  document.getElementById('hi').textContent='HI: '+Math.max(score,hiScore);
  document.getElementById('lv').textContent='STAGE '+stage;
  document.getElementById('lv2').textContent='❤'.repeat(Math.max(0,lives));
  if(score>hiScore)hiScore=score;
}
function showOverlay(t,s){
  const m=document.getElementById('msg');
  m.innerHTML='<h2>'+t+'</h2><p>'+s+'</p>';
  m.classList.remove('hidden');
  document.getElementById('overlay').style.display='flex';
}
function hideOverlay(){
  document.getElementById('overlay').style.display='none';
  document.getElementById('msg').classList.add('hidden');
}

// ─────────────────────────────────────────
//  START
// ─────────────────────────────────────────
function startGame(){
  score=0;lives=3;stage=1;
  initStage(1);updateHUD();
  state='playing';hideOverlay();
  // Draw one frame immediately
  drawBG();drawGirders();drawLadders();drawPrincess();drawDoctor();drawCanvasHUD();
}

// ─────────────────────────────────────────
//  INPUT
// ─────────────────────────────────────────
document.addEventListener('keydown',e=>{
  keys[e.code]=true;keys[e.key]=true;
  if(e.code==='Space'||e.key===' ')doJump();
});
document.addEventListener('keyup',e=>{keys[e.code]=false;keys[e.key]=false;});

function bindBtn(id,dn,up){
  const el=document.getElementById(id);if(!el)return;
  const evDn=['touchstart','mousedown'];
  const evUp=['touchend','touchcancel','mouseup','mouseleave'];
  evDn.forEach(ev=>el.addEventListener(ev,e=>{e.preventDefault();e.stopPropagation();el.classList.add('pr');dn();},{passive:false}));
  evUp.forEach(ev=>el.addEventListener(ev,e=>{e.preventDefault();el.classList.remove('pr');if(up)up();},{passive:false}));
}

bindBtn('bl',    ()=>tLeft=true,  ()=>tLeft=false);
bindBtn('br',    ()=>tRight=true, ()=>tRight=false);
bindBtn('bup',   ()=>tUp=true,    ()=>tUp=false);
bindBtn('bdown', ()=>tDown=true,  ()=>tDown=false);
bindBtn('bjump', ()=>doJump(),    null);

// Kick off render loop
X.fillStyle='#000';X.fillRect(0,0,CW,CH);
requestAnimationFrame(loop);
</script>
</body>
</html>
