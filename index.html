<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>DR. ZOMBIE KONG</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Courier New',monospace;touch-action:none;}
#wrap{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;background:#000;}
#c{display:block;width:100%;max-width:420px;flex:1;min-height:0;image-rendering:pixelated;image-rendering:crisp-edges;background:#000;}
#hud{width:100%;max-width:420px;display:flex;justify-content:space-between;padding:3px 10px;background:#0a0a0a;border-top:2px solid #ff4400;border-bottom:1px solid #330a00;flex-shrink:0;}
#hud span{font-size:11px;font-weight:bold;}
#sc{color:#ffcc00;}#lv2{color:#ff6666;}#lv{color:#66ff88;}#hi{color:#ffff44;}
#ctrl{width:100%;max-width:420px;height:160px;background:#080808;border-top:2px solid #333;display:flex;align-items:center;justify-content:space-between;padding:6px 14px;flex-shrink:0;}
#dpad{display:grid;grid-template-columns:56px 56px 56px;grid-template-rows:56px 56px;gap:4px;}
#rside{display:flex;flex-direction:column;align-items:center;gap:6px;}
.b{background:#111;border:3px solid #555;color:#ccc;border-radius:12px;cursor:pointer;font-family:'Courier New',monospace;font-weight:900;user-select:none;-webkit-user-select:none;touch-action:none;-webkit-tap-highlight-color:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.1;}
.b:active,.b.pr{transform:scale(0.91);}
.db{width:56px;height:56px;font-size:22px;border-color:#444;}
.db:active,.db.pr{background:#333;border-color:#888;}
#bup{border-color:#cc9900;color:#ffcc00;background:#120e00;}
#bup:active,#bup.pr{background:#ffcc00;color:#000;}
#bdown{border-color:#996600;color:#cc9900;background:#100c00;}
#bdown:active,#bdown.pr{background:#cc9900;color:#000;}
.blank{width:56px;height:56px;}
#bjump{width:84px;height:84px;font-size:22px;border-color:#ff4400;color:#ff6622;border-radius:50%;border-width:4px;background:#180500;}
#bjump:active,#bjump.pr{background:#ff4400;color:#fff;}
#bstart{background:#220000;border:2px solid #ff4400;color:#ff6644;border-radius:10px;padding:8px 14px;font-size:11px;font-weight:900;cursor:pointer;font-family:'Courier New',monospace;touch-action:none;user-select:none;width:84px;text-align:center;}
#bstart:active{background:#ff4400;color:#fff;}
#overlay{position:absolute;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;height:calc(100% - 160px - 26px);display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:20;}
#msg{background:rgba(0,0,0,0.88);border:3px solid #ff4400;border-radius:8px;padding:14px 18px;text-align:center;width:85%;max-width:300px;}
#msg h2{font-size:15px;color:#ffcc00;text-shadow:0 0 8px #ff6600;margin-bottom:7px;}
#msg p{font-size:10px;color:#ffaa66;line-height:1.75;}
#msg.hidden{display:none;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="360" height="300"></canvas>
  <div id="hud">
    <span id="sc">SCORE: 0</span>
    <span id="lv2">❤❤❤</span>
    <span id="lv">STAGE 1</span>
    <span id="hi">HI: 0</span>
  </div>
  <div id="ctrl">
    <div id="dpad">
      <div class="blank"></div>
      <button class="b db" id="bup">▲<br><span style="font-size:8px">UP</span></button>
      <div class="blank"></div>
      <button class="b db" id="bl">◄</button>
      <button class="b db" id="bdown">▼<br><span style="font-size:8px">DN</span></button>
      <button class="b db" id="br">►</button>
    </div>
    <div id="rside">
      <button class="b" id="bjump">JUMP</button>
      <button id="bstart" onclick="startGame()">▶ START</button>
    </div>
  </div>
</div>
<div id="overlay">
  <div id="msg">
    <h2>🧟 DR. ZOMBIE KONG</h2>
    <p>Dr. Z kidnapped the Princess! 👸<br><br>
    ◄ ► Walk · ▲ UP on ladder = climb<br>
    ▼ DN = climb down<br>
    JUMP = hop over zombies only!<br>
    Collect 💊 pills · Reach 👸 to win!</p>
  </div>
</div>

<script>
'use strict';
const C=document.getElementById('c'),X=C.getContext('2d');
const CW=360,CH=300;
C.width=CW;C.height=CH;

function resizeC(){
  const ctrlH=160,hudH=26;
  const avail=window.innerHeight-ctrlH-hudH;
  const maxW=Math.min(window.innerWidth,420);
  const scale=Math.min(maxW/CW,avail/CH);
  C.style.width=(CW*scale)+'px';
  C.style.height=(CH*scale)+'px';
}
resizeC();
window.addEventListener('resize',resizeC);

// ── PHYSICS CONSTANTS ──
// Floor gap = 28px, zombie height = 14px
// JUMP_VY=-3.8, gravity=0.45 → peak = 3.8²/(2×0.45) = 16px
// 16px > 14px (zombie) ✓ CAN hop zombie
// 16px < 28px (floor gap) ✓ CANNOT reach next floor
const JUMP_VY = -3.8;
const GRAVITY = 0.45;
const FLOOR_GAP = 28;

// 9 floors, tightly packed
const GIRDERS=[
  {y:284,x:4, w:352,tilt: 3}, // 0 bottom →
  {y:256,x:4, w:340,tilt:-3}, // 1 ←
  {y:228,x:4, w:352,tilt: 3}, // 2 →
  {y:200,x:4, w:340,tilt:-3}, // 3 ←
  {y:172,x:4, w:352,tilt: 3}, // 4 →
  {y:144,x:4, w:340,tilt:-3}, // 5 ←
  {y:116,x:4, w:352,tilt: 3}, // 6 →
  {y:88, x:4, w:340,tilt:-3}, // 7 ←
  {y:60, x:4, w:352,tilt:-3}, // 8 top (doctor+princess)
];
const GH=8;

// Ladders alternating sides, one per gap
const LADDERS=[
  {cx:65,  y1:GIRDERS[1].y,y2:GIRDERS[0].y+GH,w:12},
  {cx:275, y1:GIRDERS[2].y,y2:GIRDERS[1].y+GH,w:12},
  {cx:75,  y1:GIRDERS[3].y,y2:GIRDERS[2].y+GH,w:12},
  {cx:265, y1:GIRDERS[4].y,y2:GIRDERS[3].y+GH,w:12},
  {cx:70,  y1:GIRDERS[5].y,y2:GIRDERS[4].y+GH,w:12},
  {cx:270, y1:GIRDERS[6].y,y2:GIRDERS[5].y+GH,w:12},
  {cx:68,  y1:GIRDERS[7].y,y2:GIRDERS[6].y+GH,w:12},
  {cx:268, y1:GIRDERS[8].y,y2:GIRDERS[7].y+GH,w:12},
];

let state='menu',score=0,hiScore=0,lives=3,stage=1,frame=0;

const DOC={x:0,y:0,w:28,h:40,throwTimer:0,throwInterval:140,animF:0,laughTimer:0};
const PRINCESS={x:0,y:0,w:18,h:30,animF:0};

const PL={
  x:20,y:0,w:14,h:20,
  vx:0,vy:0,
  onGround:false,climbing:false,climbLad:null,
  dir:1,walkF:0,invincible:0,dead:false,deathTimer:0
};

let zombies=[],pills=[],fires=[],particles=[],pops=[];

function initStage(s){
  zombies=[];pills=[];fires=[];particles=[];pops=[];
  frame=0;
  DOC.throwInterval=Math.max(50,145-s*16);
  DOC.throwTimer=Math.floor(DOC.throwInterval*0.6);
  DOC.laughTimer=0;

  const topG=GIRDERS[GIRDERS.length-1];
  DOC.x=topG.x+topG.w-50;
  DOC.y=topG.y-DOC.h;
  PRINCESS.x=topG.x+10;
  PRINCESS.y=topG.y-PRINCESS.h;

  const pillSlots=[
    {g:1,ox:50},{g:1,ox:160},{g:1,ox:270},
    {g:2,ox:60},{g:2,ox:180},{g:2,ox:290},
    {g:3,ox:55},{g:3,ox:175},
    {g:4,ox:65},{g:4,ox:200},{g:4,ox:300},
    {g:5,ox:55},{g:5,ox:190},
    {g:6,ox:70},{g:6,ox:220},
    {g:7,ox:60},{g:7,ox:210},
  ];
  pillSlots.forEach(({g,ox})=>{
    pills.push({x:GIRDERS[g].x+ox,y:GIRDERS[g].y-11,w:10,h:10,collected:false});
  });

  if(s>=2){
    const n=Math.min(s-1,4);
    for(let i=0;i<n;i++) fires.push({x:GIRDERS[0].x+100+i*55,y:GIRDERS[0].y-18,animF:i*6});
  }

  PL.x=GIRDERS[0].x+14;
  PL.y=GIRDERS[0].y-PL.h;
  PL.vx=0;PL.vy=0;PL.onGround=true;PL.climbing=false;PL.climbLad=null;
  PL.dead=false;PL.deathTimer=0;PL.invincible=90;PL.dir=1;PL.walkF=0;
}

function spawnZombie(){
  const spd=0.7+(stage-1)*0.2+Math.random()*0.2;
  const topG=GIRDERS[GIRDERS.length-1];
  zombies.push({
    x:DOC.x-16,y:topG.y-14,
    w:11,h:14,
    spd,dir:-1,gIdx:GIRDERS.length-1,
    falling:false,vy:0,animF:0,
    dead:false,deathTimer:0,scored:false,charging:false
  });
  DOC.laughTimer=55;
  spawnFX(DOC.x+DOC.w/2,DOC.y+DOC.h,'#22ff44',4,-1.2);
}

function updateZombies(){
  zombies=zombies.filter(z=>{
    if(z.dead){z.deathTimer--;return z.deathTimer>0;}
    z.animF++;

    const playerOnSameGirder=!PL.dead&&!PL.climbing&&
      PL.y+PL.h>=GIRDERS[z.gIdx].y-4&&PL.y+PL.h<=GIRDERS[z.gIdx].y+14;
    const distToPlayer=Math.abs((PL.x+PL.w/2)-(z.x+z.w/2));
    const close=playerOnSameGirder&&distToPlayer<130;
    const effectiveSpd=close?z.spd*(1.7+Math.min(0.9,(130-distToPlayer)/130)):z.spd;
    z.charging=close;

    if(z.falling){
      z.vy=Math.min(z.vy+0.7,7);
      z.y+=z.vy;
      z.x+=z.dir*z.spd*0.25;
      let landed=false;
      for(let ni=z.gIdx-1;ni>=0;ni--){
        const ng=GIRDERS[ni];
        if(z.x+z.w>ng.x+4&&z.x<ng.x+ng.w-4){
          if(z.y+z.h>=ng.y&&z.y+z.h<=ng.y+z.vy+2){
            z.y=ng.y-z.h;z.gIdx=ni;z.falling=false;z.vy=0;
            if(ng.tilt>0)z.dir=1;else if(ng.tilt<0)z.dir=-1;
            landed=true;break;
          }
        }
      }
      if(!landed&&z.y>CH+20)return false;
      return true;
    }

    const g=GIRDERS[z.gIdx];
    z.y=g.y-z.h;
    z.x+=z.dir*effectiveSpd;

    const lEdge=g.x+2,rEdge=g.x+g.w-z.w-2;
    if(z.dir<0&&z.x<=lEdge){
      z.x=lEdge;
      if(g.tilt<=0){z.falling=true;z.vy=1.2;}else z.dir=1;
    } else if(z.dir>0&&z.x>=rEdge){
      z.x=rEdge;
      if(g.tilt>=0){z.falling=true;z.vy=1.2;}else z.dir=-1;
    }
    if(z.y>CH+40)return false;

    if(!z.scored&&!PL.dead&&PL.vy<-0.1){
      const pcx=PL.x+PL.w/2,zcx=z.x+z.w/2;
      if(Math.abs(pcx-zcx)<22&&PL.y+PL.h<=z.y+4&&!PL.climbing){
        z.scored=true;score+=150;addPop(zcx,z.y-8,'+150','#ffcc00');updateHUD();
      }
    }

    if(!PL.dead&&PL.invincible<=0){
      if(overlap(PL,{x:z.x+2,y:z.y+3,w:z.w-4,h:z.h-5}))hurtPlayer();
    }
    return true;
  });
}

let keys={};
let tLeft=false,tRight=false,tUp=false,tDown=false;

function doJump(){
  if(PL.dead||PL.climbing)return;
  if(PL.onGround){PL.vy=JUMP_VY;PL.onGround=false;spawnFX(PL.x+PL.w/2,PL.y+PL.h,'#4488ff',2,-0.6);}
}

function updatePlayer(){
  if(PL.dead){
    PL.deathTimer--;
    if(PL.deathTimer<=0){
      lives--;updateHUD();
      if(lives<=0){state='gameover';showOverlay('💀 GAME OVER 💀','Score: '+score+'<br>The outbreak won!<br><br>Press START to try again');}
      else{initStage(stage);state='playing';hideOverlay();}
    }
    return;
  }
  if(PL.invincible>0)PL.invincible--;

  const goL=keys['ArrowLeft']||keys['a']||tLeft;
  const goR=keys['ArrowRight']||keys['d']||tRight;
  const goU=keys['ArrowUp']||keys['w']||tUp;
  const goD=keys['ArrowDown']||keys['s']||tDown;

  if(PL.climbing){
    PL.vx=0;
    PL.vy=goU?-2.0:goD?2.0:0;
    PL.y+=PL.vy;
    PL.x=PL.climbLad.cx-PL.w/2;
    if(goU&&PL.y+PL.h<=PL.climbLad.y1+2){
      PL.y=PL.climbLad.y1-PL.h;PL.climbing=false;PL.climbLad=null;PL.vy=0;PL.onGround=true;
    }
    if(goD&&PL.y+PL.h>=PL.climbLad.y2){
      PL.y=PL.climbLad.y2-PL.h;PL.climbing=false;PL.climbLad=null;PL.vy=0;PL.onGround=true;
    }
    if(PL.y+PL.h>PL.climbLad.y2+10){PL.climbing=false;PL.climbLad=null;}
    collectPills();
    return;
  }

  if(goL){PL.vx=-2.2;PL.dir=-1;}
  else if(goR){PL.vx=2.2;PL.dir=1;}
  else PL.vx*=0.65;

  if(PL.onGround&&Math.abs(PL.vx)>0.2)PL.walkF++;

  PL.vy=Math.min(PL.vy+GRAVITY,9);
  PL.x+=PL.vx;
  PL.y+=PL.vy;
  PL.onGround=false;

  for(const g of GIRDERS){
    if(PL.x+PL.w>g.x+2&&PL.x<g.x+g.w-2){
      if(PL.vy>=0&&PL.y+PL.h>g.y&&PL.y+PL.h<=g.y+14){
        PL.y=g.y-PL.h;PL.vy=0;PL.onGround=true;break;
      }
    }
  }

  if(goU){
    for(const lad of LADDERS){
      const lx=lad.cx-lad.w/2-4,rx=lad.cx+lad.w/2+4;
      if(PL.x+PL.w>lx&&PL.x<rx){
        const nearBase=Math.abs(PL.y+PL.h-lad.y2)<14;
        if(nearBase){PL.climbing=true;PL.climbLad=lad;PL.vx=0;PL.vy=0;PL.x=lad.cx-PL.w/2;break;}
      }
    }
  }

  PL.x=Math.max(0,Math.min(CW-PL.w,PL.x));
  if(PL.y>CH+30){hurtPlayer();return;}
  if(PL.y<0){PL.y=0;PL.vy=Math.abs(PL.vy)*0.2;}

  collectPills();

  fires.forEach(f=>{
    if(overlap(PL,{x:f.x-2,y:f.y+6,w:14,h:10}))hurtPlayer();
  });

  if(!PL.dead&&overlap(PL,PRINCESS))winStage();
}

function collectPills(){
  pills.forEach(p=>{
    if(p.collected)return;
    if(overlap(PL,{x:p.x,y:p.y,w:p.w,h:p.h})){
      p.collected=true;score+=300;addPop(p.x+5,p.y-4,'💊+300','#ffdd44');
      spawnFX(p.x+5,p.y,'#ffdd00',6,-1.3);updateHUD();
    }
  });
}

function hurtPlayer(){
  if(PL.invincible>0||PL.dead)return;
  PL.dead=true;PL.deathTimer=50;PL.vy=-3.5;PL.vx=0;
  PL.climbing=false;PL.climbLad=null;
  spawnFX(PL.x+PL.w/2,PL.y+PL.h*.5,'#ff2200',10,-2.5);
}

function winStage(){
  score+=1200+stage*500;updateHUD();
  spawnFX(PRINCESS.x+9,PRINCESS.y,'#ff88cc',16,-2.5);
  const next=stage+1,last=stage>=5;
  stage=next;state='stageclear';
  showOverlay(
    last?'🎉 YOU WIN! 🎉':'👸 Princess Rescued!',
    last?'The outbreak is cured!<br>Score: '+score+'<br><br>Press START to play again!'
       :'Dr. Z escapes again...<br>Score: '+score+'<br><br>Stage '+next+' starting...'
  );
  if(!last)setTimeout(()=>{initStage(stage);state='playing';hideOverlay();},2400);
  else state='win';
}

// ─── DRAW ───

function drawBG(){
  X.fillStyle='#000';X.fillRect(0,0,CW,CH);
  X.fillStyle='rgba(0,0,0,0.22)';
  for(let sy=0;sy<CH;sy+=2)X.fillRect(0,sy,CW,1);
  X.fillStyle='rgba(80,20,0,0.18)';
  X.font='bold 70px monospace';X.textAlign='center';
  X.fillText(stage,CW/2,CH*.6);X.textAlign='left';
}

function drawGirders(){
  GIRDERS.forEach(g=>{
    X.fillStyle='rgba(0,0,0,0.4)';X.fillRect(g.x+2,g.y+GH+2,g.w,4);
    X.fillStyle='#cc4400';X.fillRect(g.x,g.y,g.w,GH);
    X.fillStyle='#ff6622';X.fillRect(g.x,g.y,g.w,2);
    X.fillStyle='#882200';X.fillRect(g.x,g.y+GH-2,g.w,2);
    X.fillStyle='#ffcc00';
    for(let rx=g.x+8;rx<g.x+g.w-5;rx+=18){
      X.beginPath();X.arc(rx,g.y+GH/2,2,0,Math.PI*2);X.fill();
    }
    if(g.tilt!==0){
      X.fillStyle='rgba(255,200,80,0.5)';X.font='7px monospace';X.textAlign='center';
      X.fillText(g.tilt>0?'→→':'←←',g.x+g.w/2,g.y-2);X.textAlign='left';
    }
  });
  X.fillStyle='#882200';X.fillRect(0,CH-6,CW,6);
  X.fillStyle='#cc4400';X.fillRect(0,CH-6,CW,2);
}

function drawLadders(){
  LADDERS.forEach(l=>{
    const lx=l.cx-l.w/2,h=l.y2-l.y1;
    X.fillStyle='#111';X.fillRect(lx-2,l.y1,l.w+4,h);
    X.fillStyle='#4488ff';X.fillRect(lx,l.y1,2,h);X.fillRect(lx+l.w-2,l.y1,2,h);
    X.fillStyle='#88bbff';
    for(let ry=l.y1+4;ry<l.y2;ry+=7)X.fillRect(lx+1,ry,l.w-2,2);
    X.fillStyle='#88bbff';
    X.fillRect(lx-2,l.y1,l.w+4,2);X.fillRect(lx-2,l.y2-2,l.w+4,2);
  });
}

function drawFires(){
  fires.forEach(f=>{
    f.animF++;
    const fl=Math.sin(f.animF*.22)*1.5;
    X.fillStyle='#331100';X.fillRect(f.x-3,f.y+12,14,5);
    [[14,12,'#ff4400'],[10,8,'#ff8800'],[5,5,'#ffee00']].forEach(([fw,fh,fc])=>{
      X.fillStyle=fc;X.beginPath();
      X.moveTo(f.x,f.y-fh*.5+fl);X.lineTo(f.x+fw*.5,f.y+5);X.lineTo(f.x-fw*.5,f.y+5);
      X.closePath();X.fill();
    });
  });
}

function drawPills(){
  pills.forEach(p=>{
    if(p.collected)return;
    const bob=Math.sin(frame*.08+p.x*.04)*1.2;
    X.fillStyle='#fff';X.beginPath();X.ellipse(p.x+5,p.y+4+bob,5,3,0,0,Math.PI*2);X.fill();
    X.fillStyle='#ff2222';X.beginPath();X.ellipse(p.x+5,p.y+4+bob,5,3,0,0,Math.PI);X.fill();
    X.strokeStyle='#888';X.lineWidth=0.8;
    X.beginPath();X.moveTo(p.x,p.y+4+bob);X.lineTo(p.x+10,p.y+4+bob);X.stroke();
  });
}

function drawPrincess(){
  const d=PRINCESS;d.animF++;
  const bob=Math.sin(d.animF*.06)*1.2;
  X.save();X.translate(d.x,d.y+bob);
  X.fillStyle='#ee44aa';
  X.beginPath();X.moveTo(2,13);X.lineTo(16,13);X.lineTo(18,30);X.lineTo(0,30);X.closePath();X.fill();
  X.fillStyle='rgba(255,180,220,0.3)';X.fillRect(3,15,5,8);
  X.fillStyle='#ffccaa';X.fillRect(4,7,10,8);
  X.fillStyle='#ffccaa';X.fillRect(-1,8,5,6);X.fillRect(14,8,5,6);
  X.strokeStyle='#888';X.lineWidth=1.5;
  X.beginPath();X.arc(1,13,2.5,0,Math.PI*2);X.stroke();
  X.beginPath();X.arc(17,13,2.5,0,Math.PI*2);X.stroke();
  X.fillStyle='#ffccaa';X.fillRect(3,0,12,9);
  X.fillStyle='#ffcc00';X.fillRect(2,-2,14,3);
  [[3,-5],[8,-7],[13,-5]].forEach(([cx,cy])=>{
    X.beginPath();X.moveTo(cx,cy+5);X.lineTo(cx+2,cy);X.lineTo(cx+4,cy+5);X.fill();
  });
  X.fillStyle='#fff';X.fillRect(5,2,3,3);X.fillRect(10,2,3,3);
  X.fillStyle='#5588ff';X.beginPath();X.arc(6.5,3.5,1.2,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(11.5,3.5,1.2,0,Math.PI*2);X.fill();
  if(Math.floor(d.animF/30)%2===0){
    X.fillStyle='rgba(255,255,255,0.9)';
    X.beginPath();X.roundRect(-14,-17,42,12,2);X.fill();
    X.fillStyle='#cc0044';X.font='bold 7px monospace';X.textAlign='center';
    X.fillText('SAVE ME!',9,-9);X.textAlign='left';
  }
  X.restore();
}

function drawDoctor(){
  const d=DOC;d.animF++;
  if(d.laughTimer>0)d.laughTimer--;
  const laugh=d.laughTimer>0;
  const bob=Math.sin(d.animF*.055)*1.2;
  X.save();X.translate(d.x,d.y+bob);
  X.fillStyle='#111';X.fillRect(2,36,10,4);X.fillRect(14,36,10,4);
  X.fillStyle='#331133';X.fillRect(3,26,9,12);X.fillRect(14,26,9,12);
  X.fillStyle='#fff';X.fillRect(1,13,26,15);
  X.fillStyle='#aaa';X.fillRect(1,13,5,9);X.fillRect(22,13,5,9);
  X.fillStyle='rgba(180,0,0,0.4)';X.fillRect(8,18,3,4);
  X.fillStyle='#885500';X.fillRect(3,25,22,3);X.fillStyle='#ffcc00';X.fillRect(11,25,5,3);
  X.fillStyle='#ddd';X.fillRect(-4,15,5,12);X.fillRect(27,15,5,12);
  X.save();X.translate(-2,13);X.rotate(-0.9);
  X.fillStyle='#9999ff';X.fillRect(-1,-10,4,10);
  X.fillStyle='rgba(0,255,80,0.8)';X.fillRect(0,-9,2,6);
  X.fillStyle='#aaa';X.fillRect(0,-12,2,4);
  X.restore();
  X.fillStyle='#ffccaa';X.fillRect(4,2,20,13);
  X.fillStyle='#eee';X.fillRect(3,0,22,6);
  X.strokeStyle='#222';X.lineWidth=1.2;
  X.strokeRect(5,5,6,5);X.strokeRect(13,5,6,5);
  X.beginPath();X.moveTo(11,7.5);X.lineTo(13,7.5);X.stroke();
  X.fillStyle=laugh?'#ff0000':'#cc0000';
  X.beginPath();X.arc(8,7.5,2,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(16,7.5,2,0,Math.PI*2);X.fill();
  X.strokeStyle='#333';X.lineWidth=2;
  X.beginPath();X.moveTo(4,4);X.lineTo(11,6);X.stroke();
  X.beginPath();X.moveTo(17,6);X.lineTo(24,4);X.stroke();
  if(laugh){
    X.fillStyle='#550000';X.beginPath();X.arc(14,14,4,0,Math.PI);X.fill();
    X.fillStyle='rgba(255,0,0,0.55)';X.font='bold 7px monospace';X.textAlign='center';
    X.fillText('HA HA!',14,-2);X.textAlign='left';
  } else {
    X.fillStyle='#550000';X.fillRect(7,13,14,2);
  }
  X.fillStyle='rgba(0,0,0,0.7)';X.fillRect(4,18,20,7);
  X.fillStyle='#22ff44';X.font='bold 6px monospace';X.textAlign='center';
  X.fillText('DR. Z',14,23);X.textAlign='left';
  X.restore();
}

function drawZombie(z){
  if(z.dead&&z.deathTimer>0){
    X.globalAlpha=z.deathTimer/25;
    X.fillStyle='#22ff44';X.font='11px serif';X.textAlign='center';
    X.fillText('💀',z.x+6,z.y-z.deathTimer*.35);
    X.globalAlpha=1;X.textAlign='left';return;
  }
  if(z.dead)return;

  if(z.charging){
    const glow=0.25+Math.sin(frame*.35)*0.1;
    X.fillStyle='rgba(255,50,0,'+glow+')';
    X.beginPath();X.ellipse(z.x+5.5,z.y+z.h/2,z.w*0.9,z.h*0.7,0,0,Math.PI*2);X.fill();
  }

  X.save();
  if(z.dir>0){X.translate(z.x+z.w,z.y);X.scale(-1,1);}else X.translate(z.x,z.y);

  const wk=Math.sin(z.animF*(z.charging?0.42:0.25))*2;

  X.fillStyle='rgba(0,50,0,0.35)';X.beginPath();X.ellipse(5.5,z.h+1,5,1.8,0,0,Math.PI*2);X.fill();

  // Legs
  X.fillStyle='#1a5a1a';
  X.fillRect(1,9+wk,3,7);
  X.fillRect(6,9-wk,3,7);
  X.fillStyle='#0a2a0a';
  X.fillRect(0,15+wk,5,2);
  X.fillRect(5,15-wk,5,2);

  // Body
  X.fillStyle=z.charging?'#9a3010':'#1a8a1a';
  X.fillRect(1,4,9,7);
  X.fillStyle='rgba(0,0,0,0.2)';X.fillRect(2,5,3,4);

  // Arms outstretched
  const ar=Math.sin(z.animF*.18)*2-1;
  X.fillStyle='#1a7a1a';
  X.fillRect(-4,4+ar,5,3);
  X.fillRect(9,4-ar,5,3);
  X.fillStyle='#2aaa2a';
  X.fillRect(-6,3+ar,3,5);
  X.fillRect(12,3-ar,3,5);

  // Head
  X.fillStyle='#2aaa2a';
  X.fillRect(2,0,8,6);

  // Glowing eyes
  X.fillStyle='#00ff44';
  X.beginPath();X.arc(4,2.5,1.5,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(7.5,2.5,1.5,0,Math.PI*2);X.fill();
  X.fillStyle='rgba(0,255,68,0.25)';
  X.beginPath();X.arc(4,2.5,3.5,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(7.5,2.5,3.5,0,Math.PI*2);X.fill();

  // Teeth
  X.fillStyle='#bbffbb';
  X.fillRect(3,5,1.5,1.5);
  X.fillRect(5.5,5,1.5,1.5);
  X.fillRect(8,5,1.5,1.5);

  // Hair
  X.fillStyle='#0a2a0a';
  X.fillRect(3,0,2,2);X.fillRect(7,0,2,2);

  X.restore();
}

function drawPlayer(){
  if(PL.dead&&PL.deathTimer>0){
    X.globalAlpha=PL.deathTimer/50;
    X.fillStyle='#ff2200';X.font='14px serif';X.textAlign='center';
    X.fillText('✝',PL.x+PL.w/2,PL.y-PL.deathTimer*.4);
    X.globalAlpha=1;X.textAlign='left';return;
  }
  if(PL.dead)return;
  if(PL.invincible>0&&Math.floor(PL.invincible/5)%2===0)return;

  X.save();
  if(PL.dir<0){X.translate(PL.x+PL.w,PL.y);X.scale(-1,1);}else X.translate(PL.x,PL.y);

  const isWalk=PL.onGround&&Math.abs(PL.vx)>0.2;
  const wk=isWalk?Math.sin(PL.walkF*.42)*2.5:0;
  const bob=isWalk?Math.abs(Math.sin(PL.walkF*.42))*1.2:0;

  X.fillStyle='rgba(0,0,0,0.25)';X.beginPath();X.ellipse(7,PL.h+1,6,2,0,0,Math.PI*2);X.fill();

  if(PL.climbing){
    X.fillStyle='#334455';X.fillRect(0,14,5,7);X.fillRect(8,14,5,7);
    X.fillStyle='#44aaff';X.fillRect(1,6,11,9);
    X.fillStyle='#ffccaa';
    const cg=Math.sin(frame*.2)*2;
    X.fillRect(-2,6+cg,4,6);X.fillRect(11,6-cg,4,6);
  } else {
    X.fillStyle='#334455';
    X.fillRect(1,13+wk,4,8-bob);
    X.fillRect(8,13-wk,4,8+bob);
    X.fillStyle='#111';
    X.fillRect(0,20+wk,6,2);X.fillRect(7,20-wk,6,2);
    X.fillStyle='#44aaff';X.fillRect(1,6,11,8);
    X.fillStyle='#2266cc';X.fillRect(1,13,11,1.5);
    X.fillStyle='#44aaff';X.fillRect(-2,7,4,5);X.fillRect(11,7,4,5);
    X.fillStyle='#ffccaa';X.fillRect(-2,11,4,3);X.fillRect(11,11,4,3);
    X.fillStyle='#88aaff';X.fillRect(13,7,2,7);
    X.fillStyle='#aaa';X.fillRect(13,13,2,2);
  }

  X.fillStyle='#ffccaa';X.fillRect(2,0,10,8);
  X.fillStyle='#ff8800';X.fillRect(1,0,12,3);X.fillRect(-1,2,15,2);
  X.fillStyle='#442200';X.fillRect(2,0,10,3);
  X.fillStyle='#fff';X.fillRect(3,3,3,2.5);X.fillRect(8,3,3,2.5);
  X.fillStyle='#1a1a88';
  X.beginPath();X.arc(4.5,4,1.2,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(9.5,4,1.2,0,Math.PI*2);X.fill();
  X.fillStyle='#cc5533';X.fillRect(3,6.5,7,1.5);
  X.fillStyle='#ffcc00';
  X.beginPath();X.moveTo(12,2.5);X.lineTo(15,4);X.lineTo(12,5.5);X.closePath();X.fill();

  X.restore();
}

function drawFX(){
  particles=particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.life--;
    X.globalAlpha=p.life/p.maxLife;X.fillStyle=p.col;
    X.fillRect(p.x,p.y,2,2);X.globalAlpha=1;
    return p.life>0;
  });
  pops=pops.filter(p=>{
    p.y-=.4;p.life--;
    X.globalAlpha=p.life/p.maxLife;
    X.fillStyle=p.col;X.font='bold 9px monospace';X.textAlign='center';
    X.fillText(p.txt,p.x,p.y);X.globalAlpha=1;X.textAlign='left';
    return p.life>0;
  });
}

function drawCanvasHUD(){
  X.fillStyle='rgba(0,0,0,0.65)';X.fillRect(0,0,CW,14);
  X.fillStyle='#ffcc00';X.font='bold 9px monospace';
  X.fillText('SCORE '+score,4,11);
  X.fillStyle='#ff6644';X.fillText('HI '+Math.max(score,hiScore),CW/2-25,11);
  X.fillStyle='#ff4444';
  for(let i=0;i<Math.max(0,lives);i++)X.fillText('♥',CW-12-i*10,11);
  if(state==='playing'){
    X.fillStyle='rgba(255,180,220,0.65)';X.font='8px monospace';
    X.textAlign='right';X.fillText('👸',CW-3,CH-3);X.textAlign='left';
  }
}

let lastT=0;
function loop(ts){
  requestAnimationFrame(loop);
  if(!lastT)lastT=ts;lastT=ts;frame++;
  if(state!=='playing')return;
  updatePlayer();
  updateZombies();
  DOC.throwTimer--;
  if(DOC.throwTimer<=0){spawnZombie();DOC.throwTimer=DOC.throwInterval;}
  drawBG();drawGirders();drawLadders();drawFires();drawPills();
  drawPrincess();zombies.forEach(drawZombie);drawPlayer();drawDoctor();drawFX();drawCanvasHUD();
}

function overlap(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function spawnFX(x,y,col,n=5,v=-1.2){
  for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*3,vy:v+Math.random()*1.5,col,life:20,maxLife:20});
}
function addPop(x,y,txt,col){pops.push({x,y,txt,col,life:44,maxLife:44});}

function updateHUD(){
  document.getElementById('sc').textContent='SCORE: '+score;
  document.getElementById('hi').textContent='HI: '+Math.max(score,hiScore);
  document.getElementById('lv').textContent='STAGE '+stage;
  document.getElementById('lv2').textContent='❤'.repeat(Math.max(0,lives));
  if(score>hiScore)hiScore=score;
}
function showOverlay(t,s){
  const m=document.getElementById('msg');
  m.innerHTML='<h2>'+t+'</h2><p>'+s+'</p>';
  m.classList.remove('hidden');
  document.getElementById('overlay').style.display='flex';
}
function hideOverlay(){
  document.getElementById('overlay').style.display='none';
  document.getElementById('msg').classList.add('hidden');
}

function startGame(){
  score=0;lives=3;stage=1;
  initStage(1);updateHUD();
  state='playing';hideOverlay();
  drawBG();drawGirders();drawLadders();drawPrincess();drawDoctor();drawCanvasHUD();
}

document.addEventListener('keydown',e=>{
  keys[e.code]=true;keys[e.key]=true;
  if(e.code==='Space'||e.key===' ')doJump();
});
document.addEventListener('keyup',e=>{keys[e.code]=false;keys[e.key]=false;});

function bindBtn(id,dn,up){
  const el=document.getElementById(id);if(!el)return;
  ['touchstart','mousedown'].forEach(ev=>el.addEventListener(ev,e=>{e.preventDefault();e.stopPropagation();el.classList.add('pr');dn();},{passive:false}));
  ['touchend','touchcancel','mouseup','mouseleave'].forEach(ev=>el.addEventListener(ev,e=>{e.preventDefault();el.classList.remove('pr');if(up)up();},{passive:false}));
}

bindBtn('bl',   ()=>tLeft=true,  ()=>tLeft=false);
bindBtn('br',   ()=>tRight=true, ()=>tRight=false);
bindBtn('bup',  ()=>tUp=true,    ()=>tUp=false);
bindBtn('bdown',()=>tDown=true,  ()=>tDown=false);
bindBtn('bjump',()=>doJump(),    null);

X.fillStyle='#000';X.fillRect(0,0,CW,CH);
requestAnimationFrame(loop);
</script>
</body>
</html>
