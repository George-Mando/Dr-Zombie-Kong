<script>
'use strict';

const C=document.getElementById('c'), X=C.getContext('2d');
const CW=360, CH=280;
C.width=CW; C.height=CH;

/* ─────────────────────────────
   RESIZE
───────────────────────────── */
function resizeC(){
  const ctrlH=170, hudH=26;
  const avail=window.innerHeight-ctrlH-hudH;
  const maxW=Math.min(window.innerWidth,420);
  const scale=Math.min(maxW/CW, avail/CH);
  C.style.width=(CW*scale)+'px';
  C.style.height=(CH*scale)+'px';
}
resizeC();
window.addEventListener('resize',resizeC);

/* ─────────────────────────────
   CONSTANTS (FIXED)
───────────────────────────── */
const JUMP_VY = -4.0;   // LOWER JUMP
const GRAVITY = 0.5;

/* ─────────────────────────────
   GIRDERS (9 FLOORS)
───────────────────────────── */
const GH=10;

const GIRDERS=[
  {y:268, x:4, w:352, tilt:3},
  {y:236, x:4, w:340, tilt:-3},
  {y:204, x:4, w:352, tilt:3},
  {y:172, x:4, w:340, tilt:-3},
  {y:140, x:4, w:352, tilt:3},
  {y:108, x:4, w:340, tilt:-3},
  {y:76,  x:4, w:352, tilt:3},
  {y:44,  x:4, w:340, tilt:-3},
  {y:12,  x:4, w:352, tilt:-3},
];

/* ─────────────────────────────
   LADDERS
───────────────────────────── */
const LADDERS=[
  {cx:70,  y1:236, y2:268+GH, w:14},
  {cx:280, y1:204, y2:236+GH, w:14},
  {cx:90,  y1:172, y2:204+GH, w:14},
  {cx:260, y1:140, y2:172+GH, w:14},
  {cx:80,  y1:108, y2:140+GH, w:14},
  {cx:250, y1:76,  y2:108+GH, w:14},
  {cx:110, y1:44,  y2:76+GH,  w:14},
  {cx:240, y1:12,  y2:44+GH,  w:14},
];

/* ─────────────────────────────
   PLAYER
───────────────────────────── */
const PL={
  x:20,y:0,w:18,h:24,
  vx:0,vy:0,
  onGround:false,
  climbing:false,
  climbLad:null,
  dir:1,
  invincible:0,
  dead:false,deathTimer:0
};

/* ─────────────────────────────
   ZOMBIES (SMALL)
───────────────────────────── */
let zombies=[];

function spawnZombie(){
  zombies.push({
    x:300,
    y:GIRDERS[GIRDERS.length-1].y-12,
    w:12,h:12,
    dir:-1,
    spd:1,
    gIdx:GIRDERS.length-1,
    falling:false,
    vy:0
  });
}

function updateZombies(){
  zombies.forEach(z=>{
    if(z.falling){
      z.vy+=0.8;
      z.y+=z.vy;

      const ng=GIRDERS[z.gIdx-1];
      if(ng && z.y+z.h>=ng.y){
        z.y=ng.y-z.h;
        z.gIdx--;
        z.falling=false;
        z.vy=0;
        z.dir = ng.tilt>0?1:-1;
      }
      return;
    }

    const g=GIRDERS[z.gIdx];
    z.x+=z.dir*z.spd;
    z.y=g.y-z.h;

    if(z.x<=g.x || z.x>=g.x+g.w-z.w){
      z.falling=true;
      z.vy=2;
    }

    // hit player
    if(overlap(PL,{x:z.x+2,y:z.y+2,w:8,h:8})) hurtPlayer();
  });
}

/* ─────────────────────────────
   PLAYER UPDATE (FIXED LANDING)
───────────────────────────── */
function updatePlayer(){
  if(PL.dead)return;

  const goL=keys['ArrowLeft'];
  const goR=keys['ArrowRight'];
  const goU=keys['ArrowUp'];

  if(PL.climbing){
    if(goU) PL.y-=2;
    if(keys['ArrowDown']) PL.y+=2;
    return;
  }

  if(goL){PL.vx=-2;}
  else if(goR){PL.vx=2;}
  else PL.vx*=0.6;

  PL.vy+=GRAVITY;
  PL.x+=PL.vx;
  PL.y+=PL.vy;
  PL.onGround=false;

  // FIXED landing (STRICT)
  for(const g of GIRDERS){
    if(
      PL.x+PL.w>g.x &&
      PL.x<g.x+g.w &&
      PL.vy>=0 &&
      PL.y+PL.h>=g.y &&
      PL.y+PL.h<=g.y+6   // CRITICAL FIX
    ){
      PL.y=g.y-PL.h;
      PL.vy=0;
      PL.onGround=true;
    }
  }

  // ladder grab ONLY on ground
  if(goU && PL.onGround){
    for(const l of LADDERS){
      if(Math.abs((PL.x+9)-l.cx)<10){
        PL.climbing=true;
        PL.climbLad=l;
      }
    }
  }
}

/* ─────────────────────────────
   JUMP
───────────────────────────── */
function doJump(){
  if(PL.onGround && !PL.climbing){
    PL.vy=JUMP_VY;
    PL.onGround=false;
  }
}

/* ─────────────────────────────
   DRAW
───────────────────────────── */
function draw(){
  X.fillStyle="#000";
  X.fillRect(0,0,CW,CH);

  // girders
  X.fillStyle="#cc4400";
  GIRDERS.forEach(g=>{
    X.fillRect(g.x,g.y,g.w,GH);
  });

  // ladders
  X.fillStyle="#4488ff";
  LADDERS.forEach(l=>{
    X.fillRect(l.cx-2,l.y1,4,l.y2-l.y1);
  });

  // zombies (small dudes)
  zombies.forEach(z=>{
    X.fillStyle="#22ff22";
    X.fillRect(z.x,z.y,z.w,z.h);
  });

  // player
  X.fillStyle="#ffaa00";
  X.fillRect(PL.x,PL.y,PL.w,PL.h);
}

/* ─────────────────────────────
   GAME LOOP
───────────────────────────── */
function loop(){
  updatePlayer();
  updateZombies();

  if(Math.random()<0.02) spawnZombie();

  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* ─────────────────────────────
   INPUT
───────────────────────────── */
let keys={};

document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.code==="Space") doJump();
});
document.addEventListener('keyup',e=>{
  keys[e.key]=false;
});

/* ───────────────────────────── */
function overlap(a,b){
  return a.x<b.x+b.w && a.x+a.w>b.x &&
         a.y<b.y+b.h && a.y+a.h>b.y;
}

function hurtPlayer(){
  PL.dead=true;
  setTimeout(()=>location.reload(),1000);
}
</script>
``
